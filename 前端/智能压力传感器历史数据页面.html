<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能压力传感器 - 历史数据</title>
    <link rel="stylesheet" href="./css/history_data.css">
</head>

<body>
    <div class="container">
        <!-- 页面头部区域 -->
        <header class="header">
            <!-- 头部左侧：返回按钮和页面标题 -->
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">← 返回监控</button>
                <h1>历史数据</h1>
            </div>
            <!-- 头部右侧：设备信息区域 -->
            <div class="device-info">
                <!-- 当前时间显示区域，通过JavaScript动态更新 -->
                <div class="current-time" id="currentTime"></div>
            </div>
        </header>

        <section class="filter-section">
            <h2 class="filter-title">
                📅 时间筛选
            </h2>
            <div class="filter-grid">
                <div class="form-group">
                    <label class="form-label">开始时间</label>
                    <input type="datetime-local" class="form-input" id="startTime">
                </div>
                <div class="form-group">
                    <label class="form-label">结束时间</label>
                    <input type="datetime-local" class="form-input" id="endTime">
                </div>
                <button class="btn-primary" onclick="queryData()" style="
                    padding: 12px 24px;
                    background: linear-gradient(45deg, #667eea, #764ba2);
                    color: white;
                    border: none;
                    border-radius: 8px;
                    font-size: 16px;
                    font-weight: 500;
                    cursor: pointer;
                    transition: all 0.3s ease;
                ">
                    🔍 查询数据
                </button>
            </div>
            <div class="quick-filters">
                <button class="quick-filter-btn active" onclick="setQuickFilter('1h')">最近1小时</button>
                <button class="quick-filter-btn" onclick="setQuickFilter('6h')">最近6小时</button>
                <button class="quick-filter-btn" onclick="setQuickFilter('24h')">最近24小时</button>
                <button class="quick-filter-btn" onclick="setQuickFilter('7d')">最近7天</button>
                <button class="quick-filter-btn" onclick="setQuickFilter('30d')">最近30天</button>
            </div>
        </section>

        <section class="content-section">
            <!-- 图表显示区域  需要进一步学习echarts -->
            <div class="chart-section">
                <h2 class="chart-title">📈 历史趋势图</h2>
                <!-- 图表容器，通过ID供JavaScript访问以渲染图表 -->
                <div class="chart-container" id="chartContainer">
                    <!-- 图表占位符，在无数据时显示提示信息 -->
                    <div class="chart-placeholder">
                        📊 压力趋势折线图<br>
                        <small>选择时间范围后显示数据</small>
                    </div>
                </div>
            </div>

            <div class="data-section">
                <div class="section-header">
                    <h2 class="data-title">📋 历史数据表格</h2>
                    <button class="export-btn" onclick="exportToExcel()">
                        📁 导出Excel
                    </button>
                </div>
                <div class="loading" id="loading">
                    🔄 正在加载数据...
                </div>
                <div class="no-data" id="noData">
                    📭 暂无数据，请选择时间范围后查询
                </div>
                <div class="data-table-container" id="dataTableContainer" style="display: none;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>压力值 (kPa)</th>
                                <th>状态</th>
                                <th>采样频率</th>
                                <th>设备状态</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination" style="display: none;">
                    <button onclick="changePage('prev')" id="prevBtn">上一页</button>
                    <span id="pageInfo">第 1 页，共 1 页</span>
                    <button onclick="changePage('next')" id="nextBtn">下一页</button>
                </div>
            </div>
        </section>
    </div>

    <!-- 引入外部JavaScript文件，实现页面交互功能 -->
    <script src="./js/home.js"></script>
    <script src="./js/history_data.js"></script>
</body>

</html>
