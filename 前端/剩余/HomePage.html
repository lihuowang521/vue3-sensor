<!-- 导出数据功能卡片 -->
<div class="feature-card" @click="enterExportData()">
    <!-- 点击卡片触发导出数据页面跳转 -->
    <div class="card-icon">📁</div>
    <!-- 卡片图标 -->
    <h2 class="card-title">导出数据</h2>
    <!-- 卡片标题 -->
    <p class="card-description">
        <!-- 卡片描述 -->
        导出传感器数据为Excel格式，支持自定义时间范围和数据类型
    </p>
    <!-- 功能列表 -->
    <ul class="card-features">
        <li>Excel格式导出</li>
        <li>自定义时间范围</li>
        <li>选择数据类型</li>
        <li>批量导出功能</li>
        <li>导出历史记录</li>
    </ul>
    <button class="enter-btn" @click.stop="enterExportData()">导出数据</button>
    <!-- 进入按钮 -->
</div>

传感器校准功能卡片
<div class="feature-card" @click="enterCalibrateSensor()">
    <!-- 点击卡片触发传感器校准页面跳转 -->
    <div class="card-icon">🎯</div>
    <!-- 卡片图标 -->
    <h2 class="card-title">传感器校准</h2>
    <!-- 卡片标题 -->
    <p class="card-description">
        <!-- 卡片描述 -->
        校准传感器精度，确保测量数据的准确性和可靠性
    </p>
    <!-- 功能列表 -->
    <ul class="card-features">
        <li>零点校准</li>
        <li>满量程校准</li>
        <li>校准历史记录</li>
        <li>校准报告生成</li>
        <li>一键恢复默认</li>
    </ul>
    <button class="enter-btn" @click.stop="enterCalibrateSensor()">校准传感器</button>
    <!-- 进入按钮 -->
</div>
