<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能压力传感器 - 参数设置</title>
    <link rel="stylesheet" href="./css/setting_page.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">← 返回监控</button>
                <h1>参数设置</h1>
            </div>
            <div class="device-info">
                <div class="current-time" id="currentTime"></div>
            </div>
        </header>

        <main class="main-content">
            <div class="status-message" id="statusMessage"></div>

            <form class="settings-form" id="settingsForm">
                <div class="setting-section">
                    <h2 class="section-title">
                        <span class="section-icon">📊</span>
                        采样配置
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">采样频率</label>
                            <select class="form-select" id="samplingRate">
                                <option value="10">10 Hz</option>
                                <option value="50">50 Hz</option>
                                <option value="100" selected>100 Hz</option>
                                <option value="500">500 Hz</option>
                                <option value="1000">1000 Hz</option>
                            </select>
                            <div class="form-help">传感器数据采集频率</div>
                        </div>
                    </div>
                </div>

                <div class="setting-section">
                    <h2 class="section-title">
                        <span class="section-icon">⚠️</span>
                        报警阈值
                    </h2>
                    <div class="threshold-group">
                        <div class="form-group">
                            <label class="form-label">报警下限 (kPa)</label>
                            <input type="number" class="form-input" id="lowerThreshold" value="50" min="0" max="1000"
                                step="0.1">
                            <div class="form-help">低于此值将触发下限报警</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">报警上限 (kPa)</label>
                            <input type="number" class="form-input" id="upperThreshold" value="200" min="0" max="1000"
                                step="0.1">
                            <div class="form-help">高于此值将触发上限报警</div>
                        </div>
                    </div>
                </div>

                <div class="setting-section">
                    <h2 class="section-title">
                        <span class="section-icon">🔌</span>
                        串口通信配置
                    </h2>
                    <div class="serial-config">
                        <div class="form-group">
                            <label class="form-label">波特率</label>
                            <select class="form-select" id="baudRate">
                                <option value="9600">9600</option>
                                <option value="19200">19200</option>
                                <option value="38400">38400</option>
                                <option value="57600">57600</option>
                                <option value="115200" selected>115200</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">数据位</label>
                            <select class="form-select" id="dataBits">
                                <option value="7">7位</option>
                                <option value="8" selected>8位</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">停止位</label>
                            <select class="form-select" id="stopBits">
                                <option value="1" selected>1位</option>
                                <option value="2">2位</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">校验位</label>
                            <select class="form-select" id="parity">
                                <option value="none" selected>无</option>
                                <option value="even">偶校验</option>
                                <option value="odd">奇校验</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="setting-section">
                    <h2 class="section-title">
                        <span class="section-icon">📡</span>
                        传感器校准
                    </h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">零点校准值 (kPa)</label>
                            <input type="number" class="form-input" id="zeroCalibration" value="0.0" step="0.1"
                                readonly>
                            <div class="form-help">当前零点偏移值</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">满量程校准值 (kPa)</label>
                            <input type="number" class="form-input" id="fullScaleCalibration" value="300.0" step="0.1">
                            <div class="form-help">传感器满量程值</div>
                        </div>
                    </div>
                </div>
            </form>

            <div class="button-group">
                <button type="button" class="btn btn-success" onclick="saveSettings()">
                    💾 保存配置
                </button>
                <button type="button" class="btn btn-danger" onclick="resetToDefault()">
                    🔄 恢复默认
                </button>
                <button type="button" class="btn btn-secondary" onclick="goBack()">
                    ↩️ 返回首页
                </button>
            </div>
        </main>
    </div>

    <script src="./js/home.js"></script>
    <script src="./js/setting_page.js"></script>
</body>

</html>
